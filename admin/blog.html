<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="icon" href="../assets/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="../assets/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <title>Blog | Admin Priscilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;1,400;1,500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../styles-admin.css">
</head>
<body class="admin-body">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-brand">
      <a href="../index.html" class="admin-sidebar-logo">Priscilla</a>
      <span class="admin-sidebar-tag">Admin</span>
    </div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-link"><span class="admin-nav-icon">◉</span> Dashboard</a>
      <a href="impostazioni.html" class="admin-nav-link"><span class="admin-nav-icon">🔑</span> Impostazioni</a>
      <a href="cv.html" class="admin-nav-link"><span class="admin-nav-icon">📄</span> CV</a>
      <a href="materiale.html" class="admin-nav-link"><span class="admin-nav-icon">📁</span> Materiale</a>
      <a href="blog.html" class="admin-nav-link admin-nav-link--active"><span class="admin-nav-icon">✎</span> Blog</a>
      <a href="ricette.html" class="admin-nav-link"><span class="admin-nav-icon">🍽</span> Ricette</a>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="../index.html" class="admin-back-link">← Torna al sito</a>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-page-header">
      <h1>Blog</h1>
      <p class="admin-page-desc">Scrivi e gestisci gli articoli del blog in homepage.</p>
    </header>

    <div class="admin-block admin-block--blog">
      <h2>Nuovo articolo</h2>
      <p>Titolo, meta (es. categoria · minuti di lettura), estratto e contenuto completo.</p>
      <form id="formArticolo">
        <input type="hidden" id="articoloId" name="articoloId" value="">
        <label for="articoloTitolo">Titolo articolo</label>
        <input type="text" id="articoloTitolo" name="articoloTitolo" placeholder="es. Carboidrati e sport: quando e come assumerli" required>
        <label for="articoloMeta">Meta (categoria · tempo lettura)</label>
        <input type="text" id="articoloMeta" name="articoloMeta" placeholder="es. Alimentazione · 5 min">
        <label for="articoloEstratto">Estratto (breve descrizione in homepage)</label>
        <textarea id="articoloEstratto" name="articoloEstratto" rows="2" placeholder="Una frase che appare nella card del blog..."></textarea>
        <label for="articoloContenuto">Contenuto articolo (testo completo)</label>
        <textarea id="articoloContenuto" name="articoloContenuto" rows="10" placeholder="Scrivi qui il testo dell'articolo. Puoi andare a capo; le righe saranno mostrate come paragrafi."></textarea>
        <label for="articoloImmagine">URL immagine di copertina (opzionale)</label>
        <input type="text" id="articoloImmagine" name="articoloImmagine" placeholder="https://... oppure lascia vuoto per sfondo predefinito">
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btnSalvaArticolo">Pubblica articolo</button>
          <button type="button" class="btn btn-outline" id="btnAnnullaArticolo" style="display: none;">Annulla</button>
        </div>
      </form>
      <p id="msgArticolo" class="msg" hidden></p>
      <h3 class="admin-subtitle">Articoli pubblicati</h3>
      <ul id="listaArticoliAdmin" class="lista-articoli-admin"></ul>
    </div>
  </main>

  <script src="../config.js"></script>
  <script src="../admin.js"></script>
</body>
</html>
